name: CodeGuardian PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CodeGuardian
        run: pip install -e ".[dev]"

      - name: Get changed files
        id: changed
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt
          echo "count=$(wc -l < changed_files.txt)" >> $GITHUB_OUTPUT
          cat changed_files.txt

      - name: Run CodeGuardian review
        if: steps.changed.outputs.count > 0
        run: |
          python -m codeguardian.main review --diff origin/${{ github.base_ref }}...HEAD --format markdown --output review_report.md || true

      - name: Post PR comment
        if: steps.changed.outputs.count > 0 && hashFiles('review_report.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = fs.readFileSync('review_report.md', 'utf8');

            // Truncate if too long (GitHub comment limit is ~65536 chars)
            if (body.length > 60000) {
              body = body.substring(0, 60000) + '\n\n... (report truncated)';
            }

            // Find existing CodeGuardian comments to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('CodeGuardian Review Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
