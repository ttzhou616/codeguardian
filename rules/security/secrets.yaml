# Secrets Detection Rules

rules:
  - id: SEC-010
    name: "Hardcoded password"
    severity: critical
    description: "A hardcoded password or credential was detected in source code."
    fix: "Move credentials to environment variables or a secrets manager."

  - id: SEC-011
    name: "Hardcoded API key or token"
    severity: critical
    description: "A potential API key, token, or access credential was found hardcoded."
    fix: "Store secrets in environment variables, .env files (excluded from git), or a vault."

  - id: SEC-012
    name: "Hardcoded JWT or session secret"
    severity: critical
    description: "A hardcoded JWT secret or session key was detected."
    fix: "Generate secrets at deployment time and inject via environment."

  - id: SEC-013
    name: "Private key in source code"
    severity: critical
    description: "A PEM-encoded private key was found embedded in source code."
    fix: "Store private keys outside the repository. Use a secrets manager or HSM."
